name: Trend Sniper AI v8.1 Scheduled Scan

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trend Sniper AI v8.1
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python trend_sniper.py

      - name: Save state, signals and last scan
        run: |
          git config user.name "trend-sniper-bot"
          git config user.email "trend-sniper-bot@example.com"
          git add state.json signals.csv last_scan.json || true
          git commit -m "Update scanner state, signals and last scan" || true
          git push || true
